<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelFlow SaaS | Image Editor</title>
    <!-- Bootstrap 5 & Cropper CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        body { background-color: #f8f9fa; height: 100vh; overflow: hidden; }
        .sidebar { width: 300px; background: white; border-right: 1px solid #dee2e6; height: 100vh; padding: 20px; z-index: 100; }
        .main-content { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #e9ecef; padding: 40px; }
        .img-container { max-width: 100%; max-height: 80vh; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        img { max-width: 100%; display: block; }
    </style>
</head>
<body class="d-flex">

    <!-- SaaS Sidebar -->
    <nav class="sidebar shadow-sm">
        <h4 class="mb-4 text-primary fw-bold">PixelFlow <span class="badge bg-soft text-primary fs-6">Pro</span></h4>
        
        <div class="mb-4">
            <label class="form-label fw-semibold">1. Upload Asset</label>
            <input type="file" id="fileInput" class="form-control form-control-sm" accept="image/*">
        </div>

        <hr>

        <div class="mb-4">
            <label class="form-label fw-semibold">2. Tools</label>
            <div class="d-grid gap-2">
                <button class="btn btn-outline-secondary btn-sm" id="cropBtn">Enable Crop</button>
                <button class="btn btn-primary btn-sm" id="saveCropBtn" style="display:none;">Confirm Crop</button>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold">3. Filters</label>
            <select class="form-select form-select-sm" id="filterSelect">
                <option value="none">Original</option>
                <option value="grayscale(100%)">Black & White</option>
                <option value="sepia(100%)">Vintage Sepia</option>
                <option value="brightness(150%)">Brighten</option>
                <option value="contrast(150%)">High Contrast</option>
            </select>
        </div>

        <div class="mt-auto d-grid">
            <button class="btn btn-success" id="downloadBtn">Export Image</button>
        </div>
    </nav>

    <!-- Workspace -->
    <main class="main-content">
        <div class="img-container">
            <img id="imageDisplay" src="https://via.placeholder.com/800x500?text=Upload+to+Start" alt="Editor">
        </div>
    </main>

    <!-- JS Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
