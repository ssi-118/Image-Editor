<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PixelEdit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="shell">
        <aside class="sidebar">
            <div class="brand">
                <h1>PixelEdit</h1>
                <div class="btn-group">
                    <button class="btn btn-outline-secondary icon-btn" id="undo" disabled>
                        <i class="bi bi-arrow-counterclockwise"></i></button>
                    <button class="btn btn-outline-secondary icon-btn" id="redo" disabled>
                        <i class="bi bi-arrow-clockwise"></i></button>
                </div>
            </div>

            <section class="section">
                <h2>Zoom</h2>
                <div class="input-group">
                    <button class="btn btn-outline-secondary" id="zoomOut"><i class="bi bi-zoom-out"></i></button>
                    <button class="btn btn-outline-secondary" id="zoomIn"><i class="bi bi-zoom-in"></i></button>
                    <span class="input-group-text ms-auto" id="zoomText">80%</span>
                </div>
            </section>

            <section class="section">
                <h2>Upload Asset</h2>
                <input class="form-control" type="file" id="upload" accept="image/*">
            </section>

            <hr>

            <section class="section">
                <h2>Transform</h2>
                <button class="btn btn-outline-primary" id="cropBtn">Enter Crop Mode</button>
                <div class="crop-actions d-none" id="cropActions">
                    <button class="btn btn-primary" id="applyCrop">Apply Crop</button>
                    <button class="btn btn-outline-secondary" id="cancelCrop">Cancel</button>
                </div>
                <div class="btn-group">
                    <button class="btn btn-outline-secondary" id="rotL"><i
                            class="bi bi-arrow-counterclockwise"></i></button>
                    <button class="btn btn-outline-secondary" id="rotR"><i class="bi bi-arrow-clockwise"></i></button>
                    <button class="btn btn-outline-secondary" id="flipX"><i
                            class="bi bi-symmetry-horizontal"></i></button>
                    <button class="btn btn-outline-secondary" id="flipY"><i
                            class="bi bi-symmetry-vertical"></i></button>
                </div>
            </section>

            <section class="section">
                <h2>Presets</h2>
                <div class="preset-grid">
                    <button class="btn preset-dark" data-preset="bw">B & W</button>
                    <button class="btn preset-warm" data-preset="invert">Invert</button>
                    <button class="btn preset-cyan" data-preset="dramatic">Dramatic</button>
                    <button class="btn btn-outline-secondary" data-preset="retro">Retro</button>
                </div>
            </section>

            <section class="section">
                <h2>Adjustments</h2>
                <label class="range-row"><span>Brightness</span><strong id="brightnessVal">0</strong></label>
                <input class="form-range" id="brightness" type="range" min="-100" max="100" value="0">
                <label class="range-row"><span>Contrast</span><strong id="contrastVal">0</strong></label>
                <input class="form-range" id="contrast" type="range" min="-100" max="100" value="0">
                <label class="range-row"><span>Saturation</span><strong id="saturationVal">100</strong></label>
                <input class="form-range" id="saturation" type="range" min="0" max="200" value="100">
            </section>

            <section class="section mt-auto">
                <button class="btn btn-outline-danger" id="reset">Reset All Changes</button>
                <button class="btn btn-primary fw-semibold" id="export">Export Image</button>
            </section>
        </aside>

        <section class="canvas-area">
            <div class="stage">
                <img id="img" alt="Editable asset">
                <p class="empty" id="empty">Upload an image to start editing</p>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    <script src="editor.js"></script>
</body>

</html>
